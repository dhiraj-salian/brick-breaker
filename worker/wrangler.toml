name = "brickbreaker-leaderboard"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Top-level config IS the production environment.
# `wrangler deploy` (no -e flag) deploys this.

# KV namespace binding.
#   wrangler kv:namespace create SCORES
#   wrangler kv:namespace create SCORES --preview
[[kv_namespaces]]
binding = "SCORES"
id = "317dc0d4062845c99dfdc36589099ca4"
preview_id = "9c51a11ec0eb4d1280eef3b6de3a9e00"

# Public vars.
[vars]
ALLOWED_ORIGIN = "https://brickbreaker-631.pages.dev"

# Staging environment — for `wrangler deploy -e staging` or local dev.
[env.staging]
[env.staging.vars]
ALLOWED_ORIGIN = "http://localhost:5173"
[[env.staging.kv_namespaces]]
binding = "SCORES"
id = "317dc0d4062845c99dfdc36589099ca4"
preview_id = "9c51a11ec0eb4d1280eef3b6de3a9e00"

# Secrets (set via `wrangler secret put HMAC_SECRET`):
#   HMAC_SECRET = 64-char hex string used for HMAC-SHA256 signature verification
