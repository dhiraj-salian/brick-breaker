name = "brickbreaker-leaderboard"
main = "src/index.js"
compatibility_date = "2024-12-01"

# KV namespace binding. Create with:
#   wrangler kv:namespace create SCORES
#   wrangler kv:namespace create SCORES --preview
# Then fill in the IDs below.
[[kv_namespaces]]
binding = "SCORES"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

# Vars (non-secret). Set ALLOWED_ORIGIN to your Pages URL.
#   wrangler secret put HMAC_SECRET
[vars]
ALLOWED_ORIGIN = "https://brickbreaker.pages.dev"

[env.production.vars]
ALLOWED_ORIGIN = "https://brickbreaker.pages.dev"

[env.staging.vars]
ALLOWED_ORIGIN = "http://localhost:5173"
