name = "brickbreaker-leaderboard"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Top-level config IS the production environment.
# `wrangler deploy` (no -e flag) deploys this.

# KV namespace bindings.
#   wrangler kv:namespace create SCORES
#   wrangler kv:namespace create SCORES --preview
#   wrangler kv:namespace create USERS
#   wrangler kv:namespace create USERS --preview
[[kv_namespaces]]
binding = "SCORES"
id = "317dc0d4062845c99dfdc36589099ca4"
preview_id = "9c51a11ec0eb4d1280eef3b6de3a9e00"

# USERS namespace holds user credentials (PBKDF2 salt + hash per username).
# Created 2026-07-15 via wrangler kv:namespace create USERS[--preview].
[[kv_namespaces]]
binding = "USERS"
id = "180cccc80e5b49cb8c28ff971192f59e"
preview_id = "9401a393b8f74f518369fb7562bf8c2e"

# Public vars.
# ALLOWED_ORIGIN is a comma-separated list of allowed request origins.
# First entry is the primary production URL.
[vars]
ALLOWED_ORIGIN = "https://brickbreaker.dbldr.app,https://brickbreaker-631.pages.dev"

# Staging environment — for `wrangler deploy -e staging` or local dev.
[env.staging]
[env.staging.vars]
ALLOWED_ORIGIN = "http://localhost:5173,http://localhost:8788"
[[env.staging.kv_namespaces]]
binding = "SCORES"
id = "317dc0d4062845c99dfdc36589099ca4"
preview_id = "9c51a11ec0eb4d1280eef3b6de3a9e00"

# TODO: Create staging USERS namespace and replace IDs.
[[env.staging.kv_namespaces]]
binding = "USERS"
id = "REPLACE_ME_USERS_STAGING_ID"
preview_id = "REPLACE_ME_USERS_STAGING_PREVIEW_ID"

# Secrets (set via `wrangler secret put HMAC_SECRET`):
#   HMAC_SECRET = 64-char hex string used for HMAC-SHA256 signature verification
